<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dex2Oat 控制台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Dex2Oat 控制台</h1>
      <p>KernelSU 模块内离线 WebUI</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="overview">总览</button>
      <button class="tab" data-tab="strategy">策略</button>
      <button class="tab" data-tab="tasks">任务</button>
      <button class="tab" data-tab="events">事件</button>
      <button class="tab" data-tab="logs">日志</button>
    </nav>

    <main>
      <section id="overview" class="panel active">
        <div class="card-grid">
          <article class="card">
            <h3>队列任务数</h3>
            <p id="queue-count">-</p>
          </article>
          <article class="card">
            <h3>最近任务</h3>
            <p id="last-task">-</p>
          </article>
        </div>
        <button id="refresh-overview" class="btn">刷新总览</button>
      </section>

      <section id="strategy" class="panel">
        <article class="card">
          <h3>全局策略</h3>
          <label><input type="checkbox" id="global-enabled"> 启用全局编译</label>
          <label>默认模式
            <select id="default-mode">
              <option value="speed">speed</option>
              <option value="verify">verify</option>
              <option value="speed-profile">speed-profile</option>
            </select>
          </label>
          <button id="save-strategy" class="btn">保存策略</button>
        </article>

        <article class="card">
          <h3>排除规则</h3>
          <label>包名 <input type="text" id="rule-package" placeholder="com.example.app"></label>
          <label>模式
            <select id="rule-mode">
              <option value="speed">speed</option>
              <option value="verify">verify</option>
              <option value="speed-profile">speed-profile</option>
            </select>
          </label>
          <div class="row">
            <button id="add-rule" class="btn">添加/更新规则</button>
            <button id="remove-rule" class="btn btn-danger">删除规则</button>
          </div>
        </article>
      </section>

      <section id="tasks" class="panel">
        <article class="card">
          <h3>手动入队</h3>
          <label>包名 <input type="text" id="enqueue-package" placeholder="com.example.app"></label>
          <label>来源
            <select id="enqueue-source">
              <option value="manual">manual</option>
              <option value="event">event</option>
              <option value="schedule">schedule</option>
              <option value="boot">boot</option>
            </select>
          </label>
          <button id="enqueue-task" class="btn">入队</button>
        </article>

        <article class="card">
          <h3>当前队列</h3>
          <pre id="queue-status" class="output">-</pre>
          <button id="refresh-queue" class="btn">刷新队列</button>
        </article>
      </section>

      <section id="events" class="panel">
        <article class="card">
          <h3>任务历史 / 事件流</h3>
          <pre id="history-output" class="output">-</pre>
          <button id="refresh-history" class="btn">刷新历史</button>
        </article>
      </section>

      <section id="logs" class="panel">
        <article class="card">
          <h3>运行日志</h3>
          <pre id="logs-output" class="output">-</pre>
          <button id="refresh-logs" class="btn">刷新日志</button>
        </article>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/api-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
