name: Build KernelSU Module

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module metadata
        run: |
          set -eu
          test -f module.prop
          grep -q "^id=" module.prop
          grep -q "^name=" module.prop
          grep -q "^version=" module.prop
          grep -q "^versionCode=" module.prop
          grep -q "^author=" module.prop
          grep -q "^description=" module.prop

      - name: Parse version
        id: version
        run: |
          set -eu
          VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
          VERSION_CODE=$(grep "^versionCode=" module.prop | cut -d'=' -f2)
          ZIP_NAME="dexoat_ks-v${VERSION}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "zipName=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Assemble KernelSU package
        run: |
          set -eu
          rm -rf package
          mkdir -p package

          for path in module.prop service.sh uninstall.sh scripts configs webroot; do
            if [ ! -e "$path" ]; then
              echo "missing required path: $path"
              exit 1
            fi
            cp -a "$path" package/
          done

          mkdir -p package/data package/logs
          if [ -f data/.gitkeep ]; then
            cp -a data/.gitkeep package/data/.gitkeep
          else
            touch package/data/.gitkeep
          fi
          if [ -f logs/.gitkeep ]; then
            cp -a logs/.gitkeep package/logs/.gitkeep
          else
            touch package/logs/.gitkeep
          fi

          if [ -f update.json ]; then
            cp -a update.json package/update.json
          fi

      - name: Build zip and checksum
        run: |
          set -eu
          ZIP_NAME="${{ steps.version.outputs.zipName }}"
          rm -f "$ZIP_NAME" "$ZIP_NAME.sha256"
          (
            cd package
            zip -r "../$ZIP_NAME" .
          )
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexoat_ks-v${{ steps.version.outputs.version }}
          path: |
            ${{ steps.version.outputs.zipName }}
            ${{ steps.version.outputs.zipName }}.sha256
          retention-days: 90

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.version.outputs.zipName }}
            ${{ steps.version.outputs.zipName }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
